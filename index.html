<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luvion</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 2px;
}

.menu {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}

.menu button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #1f1f1f;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 500;
}

.menu button:hover {
  background: #ff2e88;
}

.gallery {
  padding: 20px;
}

.modal {
  display: none;
}
</style>

</head>
<body>

<header>
<h1>Luvion</h1>
</header>

<nav class="menu">
<button onclick="loadCategory('femboy')">Femboy</button>
<button onclick="loadCategory('lesbian')">Lesbian</button>
<button onclick="loadCategory('gay')">Gay</button>
<button onclick="loadCategory('default')">Default</button>
<button onclick="location.href='news.html'">News</button>
</nav>

<div id="gallery" class="gallery"></div>

<div id="modal" class="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script src="script.js"></script>
</body>
</html>
