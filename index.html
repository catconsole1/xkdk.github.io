<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Сайт переезжает</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', 'Arial Black', 'Helvetica Neue', sans-serif;
            overflow: hidden; /* убираем скролл, чтобы фон был цельным */
        }

        /* Контейнер с фоновым изображением и размытием */
        .background {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('rkn1.png'); /* ваше изображение */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .background::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: rgba(0, 0, 0, 0.25); /* легкое затемнение для контраста */
            z-index: 1;
        }

        /* Контент поверх размытого фона */
        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            color: white;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
        }

        /* ==========  УПЛОТНЁННЫЕ СТИЛИ ДЛЯ ВСЕХ УСТРОЙСТВ ========== */
        /* Основной заголовок — чуть уменьшен относительно прошлой версии, но всё ещё огромен */
        .main-message {
            font-size: clamp(3.2rem, 12vw, 9rem);
            font-weight: 900;
            line-height: 1.1;        /* чуть плотнее */
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.15em;    /* меньше отступ снизу */
            word-break: break-word;
            color: #fff;
        }

        /* Блок ссылок — более компактный */
        .links {
            font-size: clamp(1.8rem, 7vw, 4.2rem);
            font-weight: 800;
            line-height: 1.2;
            margin: 0.2em 0 0.3em;    /* вертикальные отступы уменьшены */
            background: linear-gradient(135deg, #ffe68f, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
        }

        .links a {
            color: inherit;
            text-decoration: none;
            border-bottom: 3px solid rgba(255, 200, 50, 0.6);
            transition: border-color 0.15s;
        }

        .links a:hover {
            border-bottom-color: #ffcc00;
        }

        /* Разделитель "или" — мельче */
        .links span {
            font-size: 0.65em;
            display: inline-block;
            margin: 0 0.2em;
            color: #fff;
            -webkit-text-fill-color: white; /* переопределяем градиент для span */
            text-shadow: 0 0 8px black;
            opacity: 0.9;
        }

        /* Контактный блок — более плотный и компактный */
        .contact {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            font-weight: 600;
            margin-top: 0.8em;          /* небольшой отступ сверху */
            padding: 0.7em 1.5em;
            background: rgba(10, 10, 10, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 6px 18px rgba(0,0,0,0.5);
            line-height: 1.3;            /* более плотный межстрочник */
            display: inline-block;        /* чтобы фон был только вокруг текста */
        }

        .contact a {
            color: #ffdb7c;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.5);
        }

        .contact a:hover {
            color: #fff0b5;
            border-bottom: 2px solid #fd0;
        }

        /* для телефонов: дополнительное уплотнение если нужно */
        @media (max-width: 480px) {
            .main-message {
                line-height: 1.0;           /* ещё плотнее */
                margin-bottom: 0.05em;
            }
            .links {
                margin: 0.1em 0;
            }
            .contact {
                margin-top: 0.6em;
                padding: 0.5em 1.2em;
                font-size: clamp(1rem, 4.5vw, 1.8rem);
            }
        }

        /* планшеты: небольшая корректировка */
        @media (min-width: 768px) and (max-width: 1024px) {
            .main-message {
                font-size: clamp(5rem, 10vw, 7rem);
            }
            .links {
                font-size: clamp(2.2rem, 5vw, 3.5rem);
            }
        }

        /* десктоп: оставляем крупно, но без лишних отступов */
        @media (min-width: 1025px) {
            .content {
                padding: 20px;
            }
            .contact {
                transition: transform 0.2s;
            }
            .contact:hover {
                transform: scale(1.02);
                background: rgba(20, 20, 20, 0.7);
                border-color: gold;
            }
        }

        /* подсказка про картинку (не мешает) */
        .watermark-note {
            position: absolute;
            bottom: 5px;
            right: 10px;
            z-index: 3;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="content">
            <div class="main-message">
                САЙТ ПЕРЕЕЗЖАЕТ<br>НА НОВЫЙ
            </div>
            <div class="links">
                <a href="https://luvion.site" target="_blank" rel="noopener noreferrer">luvion.site</a>
                <span>или</span>
                <a href="https://luvionmirror.site" target="_blank" rel="noopener noreferrer">luvionmirror.site</a>
            </div>
            <div class="contact">
                📧 <a href="mailto:admin@catconsole.ru">admin@catconsole.ru</a> &nbsp;|&nbsp;
                💬 Telegram: <a href="https://t.me/kotconsole" target="_blank">@kotconsole</a>
            </div>
        </div>
        <!-- небольшой маркер про rkn1.png (можно удалить) -->
        <div class="watermark-note">rkn1.png (blur)</div>
    </div>
</body>
</html>
